<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>OhMyFood! - Acceuil</title>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="assets/style.css">
    </head>

    <body>
        <header class="header">
            <h1 class="header__title">ohmyfood</h1>
        </header>

    <main>
        <div class="location">
            <img src="assets/images/icones/localisation.svg" alt="Icones de localisation">
            <p class="location__text">Paris, Belleville</p>
        </div>
            <section class="explore-restaurants">
                <h2 class="explore-restaurants__title">Réservez le menu qui vous convient</h2>
                <p class="explore-restaurants__text">Découvrez des restaurants d'exception, sélectionnés par nos soins.</p>
                <button class="btn">Explorer nos restaurants</button>
            </section>
                <section class="operations">
                    <h2 class="operations__title">Fonctionnement</h2>
                        <div class="operations__step">
                            <div class="operations__number">1</div>
                            <img class="operations__icone" src="assets/images/icones/mobile-screen-button.svg" alt="icones de téléphone">
                            <h3 class="operations__step-title">Choisissez un restaurant</h3>
                        </div>
                            <div class="operations__step">
                                <div class="operations__number">2</div>
                                <img class="operations__icone" src="assets/images/icones/list-ul.svg" alt="icone de liste">
                                <h3 class="operations__step-title">Composez votre menu</h3>
                            </div>
                                <div class="operations__step">
                                    <div class="operations__number">3</div>
                                    <img class="operations__icone" src="assets/images/icones/store.svg" alt="icone de magasin">
                                    <h3 class="operations__step-title">Dégustez au restaurant</h3>
                                </div>
                </section>
                
    </main>
    </body>
</html>
